name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-keypress-windows-x64
          path: target/release/auto-keypress.exe

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-keypress-macos-arm64
          path: target/aarch64-apple-darwin/release/auto-keypress

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [build-windows, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Resolve release metadata
        id: meta
        run: |
          python3 .github/scripts/release_meta.py \
            --repo-root . \
            --github-output "$GITHUB_OUTPUT" \
            --release-body-path "$RUNNER_TEMP/release-body.md"

      - name: Download artifacts
        if: steps.meta.outputs.should_release == 'true'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Ensure release tag
        if: steps.meta.outputs.should_release == 'true'
        env:
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          git fetch --force --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            TAG_SHA="$(git rev-list -n 1 "$TAG_NAME")"
            if [ "$TAG_SHA" != "$TARGET_SHA" ]; then
              echo "Tag $TAG_NAME already points to $TAG_SHA, expected $TARGET_SHA"
              exit 1
            fi
          else
            git tag "$TAG_NAME" "$TARGET_SHA"
            git push origin "refs/tags/$TAG_NAME"
          fi

      - name: Create Release
        if: steps.meta.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ steps.meta.outputs.release_body_path }}
          files: |
            artifacts/auto-keypress-windows-x64/auto-keypress.exe
            artifacts/auto-keypress-macos-arm64/auto-keypress
